version: '3.8'

services:
  app:
    build: .
    container_name: sportif_backend
    ports:
      - "8080:8080"
    environment:
      # Database Config
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=webuye_sportif
      - DB_PORT=3306
      - DB_SSLMODE=disable
      
      # App Config
      - PORT=8080
      - JWT_SECRET=super-secret-key
      
      # Cloudinary Config (pass these from host .env)
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      
      # Redis Config
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - sportif_network

  db:
    image: mysql:8.0
    container_name: sportif_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=webuye_sportif
    ports:
      - "3307:3306" # Maps host 3307 to container 3306
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sportif_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sportif_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sportif_network

networks:
  sportif_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: