version: '3.8'

services:
  app:
    build: .
    container_name: sportif_backend
    ports:
      - "8001:8001"
    # Enables host.docker.internal to resolve the linux host IP
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database Config (Passed from your .env file)
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - DB_SSLMODE=${DB_SSLMODE}
      
      # App Config
      - PORT=8001
      - JWT_SECRET=${JWT_SECRET}
      
      # Cloudinary Config
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      
      # Redis Config (Passed from your .env file)
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}